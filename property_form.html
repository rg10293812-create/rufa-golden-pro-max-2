{% extends 'base.html' %}
{% block auth %}
<div class="login-wrap">
  <div class="cardx login-card">
    <div class="login-logo"><i class="bi bi-buildings-fill"></i></div>
    <h2 class="text-center fw-black mb-1" style="font-weight:900;color:#d5a83a">RUFA GOLD</h2>
    <p class="text-center text-muted mb-4">نظام إدارة شركة تسويق عقاري</p>
    <form method="post">
      <label class="form-label fw-bold">اسم المستخدم</label>
      <input class="form-control mb-3" name="username" placeholder="ROFA" required>
      <label class="form-label fw-bold">كلمة المرور</label>
      <input class="form-control mb-4" type="password" name="password" placeholder="••••••••" required>
      <button class="btn btn-gold w-100">دخول النظام</button>
    </form>
    <div class="text-center small text-muted mt-3">الحفظ الدائم عبر PostgreSQL عند إضافة DATABASE_URL</div>
  </div>
</div>
{% endblock %}
