{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-4"><div><h1 class="page-title">{{ 'تعديل عقار' if prop else 'إضافة عقار' }}</h1><div class="page-sub">الموظف والميداني لا يشاهدون السعي، السعي يظهر للمدير عند البيع فقط</div></div><a class="btn btn-soft" href="{{ url_for('properties') }}">رجوع</a></div>
<div class="cardx p-4"><form method="post" enctype="multipart/form-data"><div class="row g-3"><div class="col-md-6"><label class="form-label fw-bold">اسم المشروع</label><input class="form-control" name="project_name" value="{{ prop.project_name if prop else '' }}" required></div><div class="col-md-3"><label class="form-label fw-bold">نوع العقار</label><input class="form-control" name="property_type" value="{{ prop.property_type if prop else '' }}" placeholder="فيلا / دور / شقة" required></div><div class="col-md-3"><label class="form-label fw-bold">الحي</label><input class="form-control" name="district" value="{{ prop.district if prop else '' }}" required></div><div class="col-md-4"><label class="form-label fw-bold">السعر التقريبي</label><input class="form-control" name="price" value="{{ prop.price if prop else '' }}" placeholder="مثال: 1500000"></div><div class="col-md-4"><label class="form-label fw-bold">الحالة</label><select class="form-select" name="status"><option value="available" {% if prop and prop.status=='available' %}selected{% endif %}>متاح</option><option value="reserved" {% if prop and prop.status=='reserved' %}selected{% endif %}>محجوز</option><option value="sold" {% if prop and prop.status=='sold' %}selected{% endif %}>مباع</option></select></div><div class="col-md-4"><label class="form-label fw-bold">صور العقار</label><input class="form-control" type="file" name="images" multiple accept="image/*"></div><div class="col-12"><label class="form-label fw-bold">المواصفات</label><textarea class="form-control" name="specs" rows="7" placeholder="المساحة، الشارع، الواجهة، الضمانات، الملاحظات...">{{ prop.specs if prop else '' }}</textarea></div></div><div class="mt-4"><button class="btn btn-gold"><i class="bi bi-check2-circle"></i> حفظ تلقائي</button></div></form></div>
{% if prop and prop.images %}<div class="cardx p-4 mt-3"><h3 class="section-title mb-3">صور العقار</h3><div class="row g-3">{% for img in prop.images %}<div class="col-6 col-md-3"><img src="{{ url_for('static', filename='uploads/' + img.filename) }}" class="w-100" style="height:150px;object-fit:cover;border-radius:16px"></div>{% endfor %}</div></div>{% endif %}
{% endblock %}
